apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: yelp-lab2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: api
          image: user-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: yelp-config
            - secretRef:
                name: yelp-secrets
          env:
            - name: SERVICE_NAME
              value: user-service
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: yelp-lab2
spec:
  selector:
    app: user-service
  ports:
    - port: 8000
      targetPort: 8000
---
